# Obsidian Shaders - configurable OptiFine/Iris shaderpack
# Profiles are exposed in Video Settings > Shaders > Shader Options.

profile.WEAK=shadowMapResolution:1024 SHADOW_QUALITY:0.55 SSAO_ENABLED:false VOLUMETRIC_FOG:false BLOOM_ENABLED:false REFLECTION_QUALITY:0 TONE_PROFILE:0 HORROR_INTENSITY:0.45 GRAIN_STRENGTH:0.10 DETAIL_NORMALS:false TORCH_FLICKER:false
profile.NORMAL=shadowMapResolution:2048 SHADOW_QUALITY:0.75 SSAO_ENABLED:true VOLUMETRIC_FOG:true BLOOM_ENABLED:true REFLECTION_QUALITY:1 TONE_PROFILE:1 HORROR_INTENSITY:0.65 GRAIN_STRENGTH:0.16 DETAIL_NORMALS:true TORCH_FLICKER:true
profile.STRONG=shadowMapResolution:3072 SHADOW_QUALITY:0.90 SSAO_ENABLED:true VOLUMETRIC_FOG:true BLOOM_ENABLED:true REFLECTION_QUALITY:2 TONE_PROFILE:1 HORROR_INTENSITY:0.78 GRAIN_STRENGTH:0.20 DETAIL_NORMALS:true TORCH_FLICKER:true
profile.VERY_STRONG=shadowMapResolution:4096 SHADOW_QUALITY:1.00 SSAO_ENABLED:true VOLUMETRIC_FOG:true BLOOM_ENABLED:true REFLECTION_QUALITY:2 TONE_PROFILE:2 HORROR_INTENSITY:0.90 GRAIN_STRENGTH:0.24 DETAIL_NORMALS:true TORCH_FLICKER:true
profile.ULTRA=shadowMapResolution:8192 SHADOW_QUALITY:1.00 SSAO_ENABLED:true VOLUMETRIC_FOG:true BLOOM_ENABLED:true REFLECTION_QUALITY:3 TONE_PROFILE:2 HORROR_INTENSITY:1.00 GRAIN_STRENGTH:0.28 DETAIL_NORMALS:true TORCH_FLICKER:true

screen=<profile> [ATMOSPHERE] [LIGHTING] [DETAILS] [POST] [WATER] [ADVANCED]
screen.ATMOSPHERE=HORROR_INTENSITY VOLUMETRIC_FOG FOG_DENSITY FOG_HEIGHT MOONLIGHT_STRENGTH NIGHT_DESATURATION
screen.LIGHTING=shadowMapResolution SHADOW_QUALITY SHADOW_SOFTNESS TORCH_WARMTH TORCH_FLICKER MIN_LIGHT
screen.DETAILS=DETAIL_NORMALS DETAIL_STRENGTH PARALLAX_DEPTH WETNESS_DARKENING ENTITY_RIM_LIGHT
screen.POST=TONEMAP_EXPOSURE TONE_PROFILE BLOOM_ENABLED BLOOM_STRENGTH VIGNETTE_STRENGTH GRAIN_STRENGTH CHROMATIC_ABERRATION
screen.WATER=REFLECTION_QUALITY WATER_DARKNESS WATER_FOG WATER_WAVE_STRENGTH
screen.ADVANCED=SSAO_ENABLED SSAO_STRENGTH SSAO_RADIUS COLOR_GRADING_STRENGTH HAND_LIGHT_FIX

sliders=shadowMapResolution SHADOW_QUALITY SHADOW_SOFTNESS HORROR_INTENSITY FOG_DENSITY FOG_HEIGHT MOONLIGHT_STRENGTH NIGHT_DESATURATION TORCH_WARMTH MIN_LIGHT DETAIL_STRENGTH PARALLAX_DEPTH WETNESS_DARKENING ENTITY_RIM_LIGHT TONEMAP_EXPOSURE BLOOM_STRENGTH VIGNETTE_STRENGTH GRAIN_STRENGTH CHROMATIC_ABERRATION WATER_DARKNESS WATER_FOG WATER_WAVE_STRENGTH SSAO_STRENGTH SSAO_RADIUS COLOR_GRADING_STRENGTH

shadow.culling=true
shadowHardwareFiltering=true
oldLighting=false
underwaterOverlay=false
sun=true
moon=true
